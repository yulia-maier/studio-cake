<section class="form" id="form">
    <div class="form__container">
        <div class="form__title-group">
            <h2 class="form__title">Оформите ваш заказ .</h2>
            <h2 class="form__title">Мы уточним детали</h2>
        </div>
        <div class="form__content">
            <div class="form__card">
                <h3 class="form__card-title">
                    Закажите десерт
                </h3>
                <form action="#" class="form__body">
                    <div class="form__fields">
                        <input type="text" class="form__input" name="name" placeholder="Ваше имя" required>
                        <input type="tel" class="form__input" name="phone" placeholder="Ваш телефон" required>
                        <textarea class="form__input form__textarea" name="dessert" placeholder="Десерт"></textarea>
                    </div>
                    <label class="form__checkbox">
                        <input
                                class="form__checkbox-input"
                                type="checkbox"
                                required
                        >
                        <span class="form__checkbox-text">
        Я даю согласие на обработку моих персональных данных
      </span>
                    </label>
                    <button class="form__button" type="submit">
                        Заказать
                    </button>
                </form>

            </div>
            <div class="form__media">
                <div class="form__description">
                    Заполните контактную форму . Мы перезвоним вам в течении 5 минут для уточнения названия десерта и
                    его веса
                </div>
                <div class="form__image-wrapper">
                    <div class="form__shadow"></div>
                    <img class="form__image" src="images/chococake.png" alt="Шоколадный торт">
                </div>
            </div>
        </div>
    </div>
</section>
